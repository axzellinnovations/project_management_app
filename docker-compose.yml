services:
  # The Spring Boot Backend
  backend:
    build: ./backend
    container_name: planora-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Require datasource values from environment/.env (no hardcoded defaults).
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    networks:
      - planora-network

  # The Next.js Frontend
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: planora-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - planora-network

volumes:
  postgres_data:

networks:
  planora-network:
    driver: bridge