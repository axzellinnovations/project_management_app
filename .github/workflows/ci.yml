name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "test", "responsive-pages", "responsive-pages-*" ]
  pull_request:
    branches: [ "main", "master", "test", "responsive-pages", "responsive-pages-*" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Ensure mvnw is executable
      run: chmod +x mvnw
        
    - name: Verify Backend (Build + Tests)
      run: ./mvnw -B verify --file pom.xml
      
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: ./frontend/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/web/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci

    - name: Lint Next.js App
      run: npm run lint

    - name: Run Frontend Tests
      run: npm run test

    - name: Build Next.js App
      run: npm run build
