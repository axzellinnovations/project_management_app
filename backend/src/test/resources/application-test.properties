# Test Configuration
# spring.profiles.active=test

# H2 in-memory database for tests (replaces the required SPRING_DATASOURCE_URL in main properties)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver

# Drop and recreate schema on every test run
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway in tests — Hibernate DDL manages the H2 schema
spring.flyway.enabled=false

# JWT Secret for tests
jwt.secret=test_secret_key_32_characters_long_min

# Mail configuration for tests (using dummy values)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=test_password

# AWS configuration for tests (using dummy values)
aws.accessKeyId=test-access-key
aws.secretKey=test-secret-key
aws.region=eu-north-1
aws.s3.profile-bucket=test-profile-bucket
aws.s3.dms-bucket=test-dms-bucket
aws.s3.chat-bucket=test-chat-bucket
aws.s3.task-bucket=test-task-bucket
