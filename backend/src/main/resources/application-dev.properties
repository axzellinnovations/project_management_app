spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

nplus1.guard.enabled=true
nplus1.guard.warn-threshold=35
nplus1.guard.fail-threshold=120
nplus1.guard.fail-on-exceed=false

# Keep local/dev load tests from silently running with a tiny pool.
# Environment overrides still apply:
# - DB_POOL_MAX_SIZE
# - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:12}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:540000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME:30000}
spring.datasource.hikari.connection-test-query=SELECT 1
