spring.application.name=backend

# REQUIRED: Set SPRING_DATASOURCE_URL to your PostgreSQL connection string.
# H2 in-memory database is NOT allowed here — it causes silent data loss on restart.
# Developers: export SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:6543/planora
# For tests, application-test.properties provides an H2 datasource automatically.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# DDL: Use 'validate' by default so Hibernate does NOT silently alter the schema on deploy.
# Developers: set JPA_DDL_AUTO=update locally to auto-apply schema changes.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.defer-datasource-initialization=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# N+1 guardrails are enabled in dev/test profiles.
nplus1.guard.enabled=false
nplus1.guard.warn-threshold=40
nplus1.guard.fail-threshold=120
nplus1.guard.fail-on-exceed=false

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:12}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:540000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT:3000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.connection-test-query=SELECT 1

spring.devtools.restart.enabled=false

jwt.secret=${JWT_SECRET}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Multipart limits must cover the service-layer maximum (25 MB for profile pictures).
spring.servlet.multipart.max-file-size=26MB
spring.servlet.multipart.max-request-size=30MB

aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_KEY}
aws.region=eu-north-1
aws.s3.profile-bucket=planaro-profile-photos
aws.s3.dms-bucket=planaro-dms-storage
aws.s3.chat-bucket=planaro-chat
aws.s3.task-bucket=planaro-task-storage

# CORS: comma-separated list of allowed origins.
# Override with CORS_ALLOWED_ORIGINS env var in staging/production.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Enable Flyway by default so schema changes are applied before Hibernate validate.
# Set FLYWAY_ENABLED=false explicitly only in environments that handle migrations separately.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=1
spring.flyway.connect-retries=${FLYWAY_CONNECT_RETRIES:5}
spring.flyway.init-sqls=${FLYWAY_INIT_SQLS:SET statement_timeout TO 0}