spring.application.name=backend

spring.datasource.url= ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planora_db}
spring.datasource.username= ${SPRING_DATASOURCE_USERNAME:titan}
spring.datasource.password= ${SPRING_DATASOURCE_PASSWORD:2024}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.defer-datasource-initialization=false

jwt.secret=${JWT_SECRET}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true